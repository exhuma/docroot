name: Publish Docker Images

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx

jobs:
  build-dev:
    name: Build and push dev-alpha images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend dev image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:dev-alpha

      - name: Build frontend assets
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: apps/frontend
      - run: npm run build
        working-directory: apps/frontend

      - name: Build and push nginx dev image
        uses: docker/build-push-action@v6
        with:
          context: apps
          file: apps/nginx/Dockerfile
          push: true
          tags: ${{ env.NGINX_IMAGE }}:dev-alpha
          build-args: |
            VITE_GITHUB_REPO_URL=https://github.com/${{ github.repository }}
            VITE_APP_COMMIT=${{ github.sha }}
            VITE_APP_BUILD_TIME=${{ github.event.head_commit.timestamp }}

  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{
              startsWith(github.ref, 'refs/tags/')
            }}

      - name: Extract Docker metadata (nginx)
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NGINX_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{
              startsWith(github.ref, 'refs/tags/')
            }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Build frontend assets
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: apps/frontend
      - run: npm run build
        working-directory: apps/frontend

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: apps
          file: apps/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          build-args: |
            VITE_GITHUB_REPO_URL=https://github.com/${{ github.repository }}
            VITE_APP_COMMIT=${{ github.sha }}
            VITE_APP_BUILD_TIME=${{ github.event.head_commit.timestamp }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
