map $request_uri $upload_limit_key {
    ~^/api/namespaces/[^/]+/projects/[^/]+/upload$
        $binary_remote_addr;
    default "";
}

limit_req_zone $upload_limit_key
    zone=upload_limit:10m rate=5r/m;

server {
  listen 80;
  server_name _;

  client_max_body_size 512m;

  # All API requests proxied to FastAPI.
  # Rate limiting applies only when upload_limit_key is
  # non-empty (i.e. upload endpoint only).
  location ^~ /api/ {
    limit_req zone=upload_limit burst=3 nodelay;
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;
  }

  # Static documentation served from /data.
  # Route: /{namespace}/{project}/{version}/{locale}/...
  # auth_request enforces namespace ACL via FastAPI before
  # nginx serves any file.
  location ~ ^/([^/]+)/([^/]+)/([^/]+)/([^/]+)(/.*)?$ {
    auth_request /_internal/auth;
    auth_request_set $auth_status $upstream_status;
    alias /data/namespaces/$1/projects/$2/versions/$3/$4$5;
    index index.html;
    try_files $uri $uri/ =404;
  }

  # Internal auth sub-request location.
  # Marked internal so it is unreachable by external clients.
  location = /_internal/auth {
    internal;
    proxy_pass http://api:8000;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Frontend SPA with HTML5 history fallback.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
