map $request_uri $upload_limit_key {
    ~^/api/namespaces/[^/]+/projects/[^/]+/upload$
        $binary_remote_addr;
    default "";
}

limit_req_zone $upload_limit_key
    zone=upload_limit:10m rate=5r/m;

server {
  listen 80;
  server_name _;

  client_max_body_size 512m;

  # All API requests proxied to FastAPI.
  # Rate limiting applies only when upload_limit_key is
  # non-empty (i.e. upload endpoint only).
  location ^~ /api/ {
    limit_req zone=upload_limit burst=3 nodelay;
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;
  }

  # SPA documentation wrapper page.
  # Route: /{namespace}/{project}/docs/{version}/{locale}
  # Serves the SPA index.html after ACL is verified.
  # Must appear before the static-docs regex so that a browser
  # page-refresh returns the SPA shell instead of a failed
  # static-file lookup.  The iframe inside the SPA requests
  # /{namespace}/{project}/{version}/{locale}/ (without /docs/)
  # which falls through to the static-docs location below.
  location ~ ^/[^/]+/[^/]+/docs/[^/]+/[^/]+$ {
    auth_request /internal/auth;

    root /usr/share/nginx/html;
    try_files /index.html =404;
  }

  # Static documentation served from /data.
  # Route: /{namespace}/{project}/{version}/{locale}/...
  # Every request passes through the FastAPI auth gate before
  # nginx serves the file.  auth_request returns 2xx (allow),
  # 401 (unauthenticated), or 403 (forbidden).
  location ~ ^/([^/]+)/([^/]+)/([^/]+)/([^/]+)(/.*)?$ {
    auth_request /internal/auth;

    alias /data/namespaces/$1/projects/$2/versions/$3/$4$5;
    index index.html;
  }

  # Internal-only location used by auth_request above.
  # Never reachable by external clients.
  location = /internal/auth {
    internal;
    proxy_pass http://api:8000/api/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header Host $host;
  }

  # Frontend SPA with HTML5 history fallback.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
