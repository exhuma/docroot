version: "3.9"

services:
  api:
    build:
      context: ../../apps/backend
    environment:
      - DOCROOT_DATA_ROOT=/data
      - DOCROOT_OAUTH_JWKS_URL=${DOCROOT_OAUTH_JWKS_URL}
      - DOCROOT_OAUTH_AUDIENCE=${DOCROOT_OAUTH_AUDIENCE}
      - DOCROOT_OAUTH_ROLE_EXTRACTOR=${DOCROOT_OAUTH_ROLE_EXTRACTOR:-keycloak}
      - DOCROOT_CORS_ORIGINS=${DOCROOT_CORS_ORIGINS:-*}
      - DOCROOT_OIDC_ISSUER=${DOCROOT_OIDC_ISSUER:-}
      - DOCROOT_OIDC_CLIENT_ID=${DOCROOT_OIDC_CLIENT_ID:-}
      - DOCROOT_COOKIE_SECURE=${DOCROOT_COOKIE_SECURE:-false}
    volumes:
      - data:/data
      - ../dev/jwks.json:/jwks.json:ro
    restart: unless-stopped

  nginx:
    build:
      context: ../../apps
      dockerfile: nginx/Dockerfile
      args:
        # Injected into the frontend SPA at build time.
        # Override via env vars (the Taskfile sets dev dummies).
        VITE_GITHUB_REPO_URL: ${VITE_GITHUB_REPO_URL:-}
        VITE_APP_COMMIT: ${VITE_APP_COMMIT:-}
        VITE_APP_BUILD_TIME: ${VITE_APP_BUILD_TIME:-}
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - data:/data
    restart: unless-stopped

volumes:
  data:
    name: docroot_data
