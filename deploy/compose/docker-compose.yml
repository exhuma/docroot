version: "3.9"

services:
  api:
    build:
      context: ../../apps/backend
    environment:
      - DOCROOT_DATA_ROOT=/data
      - DOCROOT_OAUTH_JWKS_URL=${DOCROOT_OAUTH_JWKS_URL}
      - DOCROOT_OAUTH_AUDIENCE=${DOCROOT_OAUTH_AUDIENCE}
      - DOCROOT_OAUTH_ROLE_EXTRACTOR=${DOCROOT_OAUTH_ROLE_EXTRACTOR:-keycloak}
      - DOCROOT_CORS_ORIGINS=${DOCROOT_CORS_ORIGINS:-*}
    volumes:
      - data:/data
      - ../dev/jwks.json:/jwks.json:ro
    restart: unless-stopped

  nginx:
    build:
      context: ../../apps
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - data:/data
    restart: unless-stopped

volumes:
  data:
    name: docroot_data
